  <!-- Bottom blocks -->
  <rect x="18" y="30" width="12" height="14" rx="3" fill="url(#grad)" opacity="0.9"/>
  <rect x="34" y="30" width="12" height="14" rx="3" fill="url(#grad)" opacity="0.7"/>
