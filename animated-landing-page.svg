<svg width="220" height="64" viewBox="0 0 220 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradMove" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1">
        <animate attributeName="offset" values="0;1;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8B5CF6">
        <animate attributeName="offset" values="1;0;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g opacity="0">
    <rect x="4" y="8" width="48" height="48" rx="12" fill="#0F172A"/>
    <path d="M18 20H38V24H22V30H34V34H22V44H38V48H18V20Z" fill="url(#gradMove)"/>
    <rect x="42" y="20" width="4" height="28" rx="2" fill="url(#gradMove)"/>

    <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      from="0 10" to="0 0" dur="0.6s" fill="freeze"/>
  </g>

  <!-- Text -->
  <g opacity="0">
    <text x="70" y="40" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="url(#gradMove)">
      Elevate.id
    </text>

    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.3s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      from="0 10" to="0 0" dur="0.8s" begin="0.3s" fill="freeze"/>
  </g>
</svg>